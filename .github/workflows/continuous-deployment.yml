name: CD
on:
  push:
    branches: [master]

jobs:
  cd:
    name: Build & Push Docker & Deploy on Render
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Checkout
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Set up Java 25
      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # 3️⃣ Extract GitHub Container Registry info
      - name: 🏷️ Set env variables
        run: |
          echo "GHCR_URL=ghcr.io" >> $GITHUB_ENV
          echo "REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "VERSION=$(./gradlew -q printVersion)" >> $GITHUB_ENV
        # Nota: crea una task `printVersion` en Gradle si no existe, o usa:
        # VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

      # 4️⃣ Build JAR
      - name: 📦 Build JAR
        run: ./gradlew clean build -x test

      # 5️⃣ Login GHCR
      - name: 📦 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PERSONAL_ACCESS_TOKEN }}

      # 6️⃣ Build & Push Docker image
      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_URL }}/${{ env.REPOSITORY }}:${{ env.VERSION }}
            ${{ env.GHCR_URL }}/${{ env.REPOSITORY }}:latest
          load: false

      # 7️⃣ Deploy on Render
      - name: 🚀 Deploy on Render
        run: |
          echo "Triggering deployment on Render..."
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_TOKEN }}" \
          && echo "✅ Deployment triggered successfully" \
          || (echo "❌ Deployment failed" && exit 1)