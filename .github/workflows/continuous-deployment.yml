name: CD

on:
  push:
    branches: [master]

jobs:
  cd:
    name: Build & Push Docker + Deploy
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: 🏷️ Extract metadata
        run: |
          echo "GHCR_URL=ghcr.io" >> $GITHUB_ENV
          echo "REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "VERSION=$(./gradlew properties -q | grep '^version:' | awk '{print $2}')" >> $GITHUB_ENV

      - name: 📦 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_URL }}/${{ env.REPOSITORY }}:${{ env.VERSION }}
            ${{ env.GHCR_URL }}/${{ env.REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Deploy on Render
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.render.com/deploy/${{ secrets.RENDER_DEPLOY_HOOK_TOKEN }}")

          if [ "$response" -eq 200 ]; then
            echo "✅ Deployment succeeded"
          else
            echo "❌ Deployment failed with status $response"
            exit 1
          fi