name: CD

on:
  push:
    branches: [master]

jobs:
  cd:
    name: Build & Push Docker Image + Deploy Render
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write   # 🔥 necesario para GHCR

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 📥 Checkout
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ☕ Java 25 (alineado con tu proyecto)
      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # 🧱 Build JAR (CLAVE)
      - name: 🧱 Build JAR
        run: ./gradlew clean build -x test

      # 🏷️ Variables
      - name: 🏷️ Set image metadata
        run: |
          echo "GHCR_URL=ghcr.io" >> $GITHUB_ENV
          echo "REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "VERSION=$(./gradlew -q printVersion || echo 0.0.1-SNAPSHOT)" >> $GITHUB_ENV

      # 📦 Login GHCR
      - name: 📦 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🛠️ Buildx (FIX cache error)
      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🐳 Build & Push Docker image
      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_URL }}/${{ env.REPOSITORY }}:${{ env.VERSION }}
            ${{ env.GHCR_URL }}/${{ env.REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🚀 Deploy Render
      - name: 🚀 Deploy on Render
        run: |
          curl --fail -X POST "https://api.render.com/deploy/${{ secrets.RENDER_DEPLOY_HOOK_TOKEN }}" \
          && echo "✅ Deployment triggered" \
          || (echo "❌ Deployment failed" && exit 1)