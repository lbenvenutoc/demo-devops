name: CI

on:
  push:
    branches: [master, release-*]
  pull_request:
    branches: [develop, master]

jobs:
  devops:
    name: Tests + CodeQL + SonarQube
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      actions: read
      security-events: write
      pull-requests: write

    steps:
      # 📥 Checkout
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ☕ Java 25
      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # 🛡️ CodeQL Init
      - name: 🛡️ Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      # 🧪 Tests + Coverage
      - name: 🧪 Run Tests
        run: ./gradlew clean test jacocoTestReport --info

      # 📦 Build (necesario para CodeQL)
      - name: 📦 Build for CodeQL
        run: ./gradlew build -x test

      # 🔍 CodeQL Analysis
      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

      # 📊 Upload Test Results (XML)
      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: build/test-results/test

      # 📊 Upload Test HTML Report
      - name: 📊 Upload Test HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: build/reports/tests/test

      # 📈 Subir coverage
      - name: 📈 Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test

      # 🔥 SONARCLOUD (único stage necesario)
      - name: 🔍 SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew build sonar --info