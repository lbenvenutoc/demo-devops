name: CI

on:
  push:
    branches: [master, release-*]
  pull_request:
    branches: [develop, master]

jobs:
  devops:
    name: Tests + CodeQL + SonarCloud
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      actions: read
      security-events: write
      pull-requests: write
      checks: write

    env:
      # 🔥 Opt-in a Node 24 desde ahora
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 📥 Checkout
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ☕ Java 25
      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # 🛡️ CodeQL Init (ACTUALIZADO)
      - name: 🛡️ Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      # 🧪 Tests + Coverage
      - name: 🧪 Run Tests + Coverage Check
        run: |
          ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification \
            -PcoverageMinimum=0.8 --info

      # 📊 Test report
      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc
        if: always()
        with:
          name: JUnit Tests
          path: build/test-results/test/*.xml
          reporter: java-junit

      # 📦 Build
      - name: 📦 Build
        run: ./gradlew build -x test

      # 🔍 CodeQL Analyze (ACTUALIZADO)
      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # 📊 HTML reports
      - name: 📊 Upload Test HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html
          path: build/reports/tests/test

      - name: 📈 Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test

      # 🔥 SonarCloud
      - name: 🔍 SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew build sonar --info